# Fixed application.properties
spring.application.name=spring3-jwt-auth

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/testdb
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# CRITICAL: Add these properties for proper initialization order
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never

# H2 Console
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# Swagger UI configuration
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs

# Optional: Disable security for development
management.security.enabled=false

# Server Configuration
server.port=8080

# JWT Configuration
jwt.issuer=spring3-jwt-auth
jwt.rsa.private-key=classpath:certs/private.pem
jwt.rsa.public-key=classpath:certs/public.pem

# Logging Configuration
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n
logging.level.root=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.file.name=logs/app.log
logging.file.path=logs